# Configuração do Netlify para a versão estática (pasta web/).
# Produção deve usar a branch **main** (Site settings → Build & deploy → Production branch).
[build]
  publish = "web"
  command = ""

[functions]
  directory = "netlify/functions"

[functions."analisar-planta"]
  timeout = 26
  memory = 1024

# Headers úteis: aceita o CDN docx.js, segurança razoável e cache curto no HTML.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
