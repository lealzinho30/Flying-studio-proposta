<!doctype html>
<html><head><meta charset="utf-8"><title>Preview DOCX</title>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/docx-preview@0.3.0/dist/docx-preview.js"></script>
<style>body{margin:0;padding:24px;background:#e7e9ee;font-family:Calibri,Arial,sans-serif}#wrap{max-width:1000px;margin:0 auto}</style>
</head><body><div id="wrap"></div><script>
(async()=>{const r=await fetch("/proposta.docx");const buf=await r.arrayBuffer();
await window.docx.renderAsync(buf,document.getElementById("wrap"),null,{inWrapper:true,breakPages:true,debug:false,experimental:true,useBase64URL:true});document.title="OK";})().catch(e=>document.body.innerHTML='<pre>'+e+'</pre>');
</script></body></html>
